# Sample Nginx site for Dracula Adventure's web version.
# TLS via certbot; static page served directly; /ws proxied to the Python server.
#
# These rate/connection-limit zones must be declared in the http{} context (e.g. a file in
# conf.d/), NOT inside a server{} block:
#   limit_conn_zone $binary_remote_addr zone=wsconn:10m;
#   limit_req_zone  $binary_remote_addr zone=wsreq:10m rate=30r/m;

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name dracula.example.com;

    ssl_certificate     /etc/letsencrypt/live/dracula.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dracula.example.com/privkey.pem;

    # HSTS + defense-in-depth headers. Server token is stripped separately via
    # libnginx-mod-http-headers-more-filter (more_clear_headers Server;).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'none'; object-src 'none'" always;

    root /opt/dracula-adventure/frontends/web/static;
    index index.html;

    location = / { try_files /index.html =404; }

    location = /ws {
        limit_conn wsconn 8;                       # max concurrent /ws per client IP
        limit_req  zone=wsreq burst=10 nodelay;    # cap new-connection rate per client IP
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_read_timeout 3600s;   # long-lived game sessions
    }
}
server {
    listen 80;
    listen [::]:80;
    server_name dracula.example.com;
    return 301 https://$host$request_uri;
}
