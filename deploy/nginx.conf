# Sample Nginx site for Dracula Adventure's web version.
# TLS via certbot; static page served directly; /ws proxied to the Python server.
server {
    listen 443 ssl http2;
    server_name dracula.example.com;

    ssl_certificate     /etc/letsencrypt/live/dracula.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dracula.example.com/privkey.pem;

    root /opt/dracula-adventure/frontends/web/static;
    index index.html;

    location = / { try_files /index.html =404; }

    location /ws {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;   # long-lived game sessions
    }
}
server {
    listen 80;
    server_name dracula.example.com;
    return 301 https://$host$request_uri;
}
