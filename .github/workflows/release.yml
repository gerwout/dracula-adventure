name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (without leading v), e.g. 1.0.0'
        required: true

permissions:
  contents: write   # required to create the GitHub Release

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Derive version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          fi

      - name: Build executables
        shell: bash
        run: |
          pyinstaller packaging/dracula-cli.spec --noconfirm --distpath dist --workpath build
          pyinstaller packaging/dracula-gui.spec --noconfirm --distpath dist --workpath build

      # ---------- Windows: Inno Setup installer ----------
      - name: Build Windows installer
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$env:VERSION" "installer\windows\dracula.iss"

      - name: Upload Windows artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/installer/*.exe
          if-no-files-found: error

      # ---------- Linux: AppImage + .deb ----------
      - name: Build Linux packages
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          bash installer/linux/build-appimage.sh "$VERSION"
          bash installer/linux/build-deb.sh "$VERSION"

      - name: Upload Linux artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: error

      # ---------- macOS: .dmg ----------
      - name: Build macOS disk image
        if: matrix.os == 'macos-latest'
        shell: bash
        run: bash installer/macos/build-dmg.sh "$VERSION"

      - name: Upload macOS artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/*.dmg
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Package the original freeware game + checksums
        shell: bash
        run: |
          ( cd original && zip -j "$GITHUB_WORKSPACE/artifacts/dracula-original-1982.zip" \
              LEESMIJ DRACULA.TXT DRACULA.EXE BASRUN.EXE )
          ( cd artifacts && find . -maxdepth 1 -type f ! -name SHA256SUMS.txt \
              -exec sha256sum {} + | sed 's|\./||' > SHA256SUMS.txt )
          ls -la artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: false
