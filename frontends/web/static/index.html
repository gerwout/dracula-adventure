<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
<title>Dracula Avontuur — remake</title>
<style>
  :root { --bg:#000; --fg:#c8c8c8; --grn:#00c000; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; overflow:hidden; background:var(--bg); color:var(--fg);
    font-family:"Consolas","DejaVu Sans Mono",monospace; }
  /* App shell: fixed to the viewport so #out is the ONLY scroll region and the menu +
     input bar stay put. interactive-widget=resizes-content keeps the input above the
     mobile keyboard (100dvh shrinks when it opens). */
  #app { display:flex; flex-direction:column; height:100dvh; }
  #menu { display:flex; flex:none; gap:.25rem; padding:.35rem .5rem; background:#0a0a0a;
    border-bottom:1px solid #222; flex-wrap:wrap; }
  #layout { display:flex; flex:1; min-height:0; }
  #gamecol { display:flex; flex-direction:column; flex:1; min-width:0; min-height:0; }
  #about { width:340px; flex:none; overflow:auto; padding:.7rem 1rem; font-size:14px;
    line-height:1.35; border-left:1px solid #222; background:#080808; }
  #about h2 { font-size:1.05rem; margin:.1rem 0 .5rem; color:var(--grn); }
  #about a { color:#5aa0ff; }
  #about ul { margin:.3rem 0; padding-left:1.2rem; }
  #about li { margin:.15rem 0; }
  #about .muted { opacity:.7; font-size:.85rem; }
  @media (max-width:820px) {
    #layout { flex-direction:column; }
    #about { display:none; }   /* reached via the m-about (ℹ️) modal instead, so the game keeps the viewport */
  }
  @media (min-width:821px) { #m-about { display:none; } }   /* desktop already shows the sidebar */
  #menu button, #menu select { background:#111; color:var(--fg); border:1px solid #333;
    font:inherit; padding:.3rem .6rem; border-radius:3px; }
  #menu button:disabled { opacity:.4; }
  #out { flex:1; min-height:0; overflow-y:auto; white-space:pre-wrap; word-break:break-word;
    padding:.6rem .8rem; line-height:1.25; font-size:15px; }
  #out.title { white-space:pre; overflow-x:hidden; }
  #out .cmd { color:var(--grn); }
  #inbar { display:flex; flex:none; align-items:center; border-top:1px solid #222; padding:.4rem .6rem; }
  #prompt { color:var(--grn); margin-right:.4rem; }
  #inp { flex:1; background:#000; color:var(--grn); border:none; outline:none;
    font:inherit; font-size:16px; }
  #keys { display:none; flex:none; gap:.4rem; padding:.4rem .6rem; flex-wrap:wrap;
    border-top:1px solid #222; }
  #keys.show { display:flex; }
  #keys button { min-width:3rem; padding:.6rem; font:inherit; font-size:16px;
    background:#111; color:var(--grn); border:1px solid #333; border-radius:4px; }
  #modal { position:fixed; inset:0; background:rgba(0,0,0,.85); display:none;
    align-items:center; justify-content:center; padding:1rem; }
  #modal.show { display:flex; }
  #modal .box { background:#fff; color:#000; max-width:680px; max-height:80vh;
    overflow:auto; padding:1rem 1.2rem; border-radius:6px; white-space:pre-wrap; }
  #modal button { margin-top:1rem; font:inherit; padding:.4rem .8rem; }
  #modal .box a { color:#0645ad; }
  #modal .box h2 { margin:0 0 .5rem; font-size:1.15rem; }
  #modal .box ul { margin:.3rem 0; padding-left:1.3rem; }
  #modal .box li { margin:.15rem 0; }
  #lang-wrap { display:flex; align-items:center; gap:.2rem; }
  #players { margin-left:auto; align-self:center; color:#8a8a8a; font-size:.9rem;
    white-space:nowrap; padding:0 .3rem; }
  .notice { color:#c08000; }
</style>
</head>
<body>
<div id="app">
  <div id="menu" hidden>
    <button data-act="new"  id="m-new"></button>
    <button data-act="save" id="m-save"></button>
    <button data-act="load" id="m-load"></button>
    <span id="lang-wrap"><span aria-hidden="true">🌐</span><select id="m-lang" title="Taal / Language"></select></span>
    <button data-act="help" id="m-help"></button>
    <button data-act="about" id="m-about" title="Over">ℹ️</button>
    <span id="players" title=""></span>
  </div>
  <div id="layout">
    <div id="gamecol">
      <div id="out"></div>
      <div id="keys"></div>
      <div id="inbar"><span id="prompt">&gt;</span><input id="inp" autocomplete="off"
        autocapitalize="off" autocorrect="off" spellcheck="false" enterkeyhint="send"></div>
    </div>
    <aside id="about"></aside>
  </div>
</div>
<div id="modal"><div><div class="box" id="modalbox"></div>
  <div style="text-align:center"><button id="modalclose">Sluit</button></div></div></div>
<script>
(function () {
  "use strict";
  const out = document.getElementById("out");
  const inp = document.getElementById("inp");
  const menu = document.getElementById("menu");
  const keys = document.getElementById("keys");
  const modal = document.getElementById("modal");
  const modalbox = document.getElementById("modalbox");
  const aboutEl = document.getElementById("about");
  let ws, awaitMode = null, langs = {}, currentLang = "nl", dlg = {};

  const url = (location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/ws";

  // -- session persistence + queued/reconnect state ------------------------ //
  // Reconnect token: kept in memory only (spec §7). Cross-session return is via named
  // saves, not the token — so a full reload starts fresh, but standby (no reload) resumes.
  let token = null;
  function storeToken(tk) { token = tk; }
  let backoff = 500, reconnectTimer = null, hbTimer = null, gotPong = true;
  const queued = [];                 // client messages typed while the socket was down
  let noticeShown = false;

  function atBottom() { return out.scrollHeight - out.scrollTop - out.clientHeight < 48; }
  function scrollToBottom() { out.scrollTop = out.scrollHeight; }
  function append(text, cls) {
    const stick = atBottom();          // auto-scroll on new output, but don't yank a reader who scrolled up
    const span = document.createElement("span");
    if (cls) span.className = cls;
    span.textContent = text;
    out.appendChild(span);
    if (stick) scrollToBottom();
  }
  function rawSend(obj) { if (ws && ws.readyState === 1) { ws.send(JSON.stringify(obj)); return true; } return false; }
  function send(obj) { if (!rawSend(obj)) { queued.push(obj); ensureConnected(); } }

  const LANG_KEY = "dracula_lang";
  function loadLang() { try { return localStorage.getItem(LANG_KEY) || ""; } catch (e) { return ""; } }
  function storeLang(code) { try { localStorage.setItem(LANG_KEY, code); } catch (e) {} }

  const REPO = "https://github.com/gerwout/dracula-adventure";
  const LATEST = REPO + "/releases/latest";
  const ORIG_ZIP = LATEST + "/download/dracula-original-1982.zip";   // stable name -> version-proof
  const TEKST = "https://www.tekstadventure.nl/database/dracula.html";
  function A(href, text) { return '<a href="' + href + '" target="_blank" rel="noopener">' + text + '</a>'; }

  const ABOUT_NL =
    '<h2>Over deze remake</h2>' +
    '<p>Dit is een moderne <strong>remake</strong> van het tekstavontuur <em>Dracula Avontuur</em> ' +
    '(oorspronkelijk Ronald van Woensel, &copy; 1982 Incore Automatisering, Rotterdam), geschreven in ' +
    'Python door <strong>Gerwout van der Veen</strong>.</p>' +
    '<p><strong>Broncode:</strong><br>' + A(REPO, "github.com/gerwout/dracula-adventure") + '</p>' +
    '<p><strong>Het originele spel (freeware):</strong><br>' + A(TEKST, "tekstadventure.nl") + '<br>' +
    A(ORIG_ZIP, "download originele DOS-versie (zip)") + '</p>' +
    '<p><strong>Downloaden &amp; installeren</strong> — nieuwste release:</p>' +
    '<ul><li>' + A(LATEST, "Windows") + ' (.exe)</li><li>' + A(LATEST, "macOS") + ' (.dmg)</li>' +
    '<li>' + A(LATEST, "Debian / Ubuntu") + ' (.deb)</li><li>' + A(LATEST, "Linux") + ' (AppImage)</li></ul>' +
    '<p class="muted">' + A(LATEST, "Alle downloads &raquo;") + '</p>';

  const ABOUT_EN =
    '<h2>About this remake</h2>' +
    '<p>This is a modern <strong>remake</strong> of the 1982 Dutch MS-DOS text adventure ' +
    '<em>Dracula Avontuur</em> (originally by Ronald van Woensel, &copy; 1982 Incore Automatisering, ' +
    'Rotterdam), written in Python by <strong>Gerwout van der Veen</strong>.</p>' +
    '<p><strong>Source code:</strong><br>' + A(REPO, "github.com/gerwout/dracula-adventure") + '</p>' +
    '<p><strong>The original game (freeware):</strong><br>' + A(TEKST, "tekstadventure.nl") + '<br>' +
    A(ORIG_ZIP, "download the original DOS version (zip)") + '</p>' +
    '<p><strong>Download &amp; install</strong> — latest release:</p>' +
    '<ul><li>' + A(LATEST, "Windows") + ' (.exe)</li><li>' + A(LATEST, "macOS") + ' (.dmg)</li>' +
    '<li>' + A(LATEST, "Debian / Ubuntu") + ' (.deb)</li><li>' + A(LATEST, "Linux") + ' (AppImage)</li></ul>' +
    '<p class="muted">' + A(LATEST, "All downloads &raquo;") + '</p>';

  function renderAbout() { aboutEl.innerHTML = (currentLang === "nl") ? ABOUT_NL : ABOUT_EN; }
  currentLang = loadLang() || "nl";
  renderAbout();

  function setMenu(flags) {
    menu.hidden = false;
    const f = (flags && typeof flags === "object") ? flags : {};
    document.getElementById("m-new").disabled = !f.new;
    document.getElementById("m-save").disabled = !f.save;
    document.getElementById("m-load").disabled = !f.load;
    document.getElementById("m-help").disabled = !f.help;
    document.getElementById("m-lang").disabled = !f.language;
  }
  function showKeys(list) {
    keys.innerHTML = "";
    list.forEach(function (k) {
      const b = document.createElement("button");
      b.textContent = k.label;
      b.onclick = function () { send({ kind: "key", ch: k.ch }); afterInput(); };
      keys.appendChild(b);
    });
    keys.classList.add("show");
  }
  function hideKeys() { keys.classList.remove("show"); keys.innerHTML = ""; }

  // -- title screen auto-fit (mobile: shrink the wide ASCII banner so it never
  //    wraps mid-word; gameplay text stays at the normal font-size) ---------- //
  function fitTitle() {
    if (!out.classList.contains("title")) { out.style.fontSize = ""; return; }
    out.style.fontSize = "";                       // measure at natural size
    const avail = out.clientWidth - 8;
    let longest = 0;
    (out.textContent || "").split("\n").forEach(function (ln) { longest = Math.max(longest, ln.length); });
    if (longest > 0 && avail > 0) {
      const target = Math.min(15, Math.max(9, Math.floor(avail / longest / 0.62)));
      out.style.fontSize = target + "px";
    }
  }
  window.addEventListener("resize", fitTitle);

  function afterInput() { /* keeps focus sane on mobile */ inp.focus(); }

  function handle(msg) {
    switch (msg.t) {
      case "out": append(msg.text, msg.cls); if (out.classList.contains("title")) fitTitle(); break;
      case "clear": out.textContent = ""; break;
      case "session": storeToken(msg.token); break;
      case "pong": gotPong = true; break;
      case "players": { const p = document.getElementById("players"); if (p) p.textContent = "👥 " + msg.count; break; }
      case "screen":
        out.classList.toggle("title", msg.kind === "title");
        if (typeof fitTitle === "function") fitTitle();
        break;
      case "langs":
        langs = msg.available || {};
        const sel = document.getElementById("m-lang");
        sel.innerHTML = "";
        Object.keys(langs).forEach(function (code) {
          const o = document.createElement("option");
          o.value = code; o.textContent = langs[code]; sel.appendChild(o);
        });
        break;
      case "menu-labels":
        const L = msg.labels || {};
        document.getElementById("m-new").textContent = L.new || "Nieuw";
        document.getElementById("m-save").textContent = L.save || "Bewaar";
        document.getElementById("m-load").textContent = L.load || "Laad";
        document.getElementById("m-help").textContent = L.help || "Help";
        document.getElementById("m-lang").title = L.language || "Taal / Language";
        if (L.players) document.getElementById("players").title = L.players;
        if (msg.lang) { document.getElementById("m-lang").value = msg.lang; currentLang = msg.lang; storeLang(msg.lang); renderAbout(); }
        if (msg.dialog) dlg = msg.dialog;
        break;
      case "await":
        awaitMode = msg.mode;
        setMenu(msg.menu);
        if (msg.mode === "key") { showKeys(msg.keys && msg.keys.length ? msg.keys : [{ label: "▶", ch: " " }]); inp.blur(); }
        else { hideKeys(); if (msg.mode === "line") inp.focus(); }
        break;
      case "save-dialog": openSaveDialog(); break;
      case "load-dialog": openLoadDialog(); break;
      case "slots": renderSlotPicker(msg.slots || []); break;
      case "save-result": onSaveResult(msg); break;
      case "load-result": onLoadResult(msg); break;
      case "help":
        modalbox.style.whiteSpace = "pre-wrap";
        modalbox.textContent = (msg.title ? msg.title + "\n\n" : "") + (msg.body || "");
        modal.classList.add("show");
        break;
    }
  }

  // -- input --------------------------------------------------------------- //
  inp.addEventListener("keydown", function (e) {
    if (modal.classList.contains("show")) { e.preventDefault(); return; }
    if (e.key === "Enter") {
      const line = inp.value;
      inp.value = "";
      if (awaitMode === "key") { send({ kind: "key", ch: line.slice(0, 1) || " " }); }
      else {
        scrollToBottom();              // pin to bottom; the server echoes the command + reply (so a refresh replays it too)
        send({ kind: "line", text: line });
      }
    } else if (awaitMode === "key" && e.key.length === 1) {
      e.preventDefault();
      send({ kind: "key", ch: e.key });
    }
  });
  document.addEventListener("keydown", function (e) {
    if (modal.classList.contains("show")) {
      if (e.key === "Escape") { if (saveFields || loadFields) cancelDialog(); else modal.classList.remove("show"); }
      return;                       // while Help is open, keys must not reach the game
    }
    if (awaitMode === "key" && document.activeElement !== inp && e.key.length === 1) {
      e.preventDefault();
      send({ kind: "key", ch: e.key });
    }
  });

  menu.addEventListener("click", function (e) {
    const b = e.target.closest("button"); if (!b) return;
    const act = b.dataset.act;
    if (act === "new") send({ kind: "start", lang: document.getElementById("m-lang").value });
    else if (act === "save" || act === "load" || act === "help") send({ kind: "menu", action: act });
    else if (act === "about") {
      modalbox.innerHTML = (currentLang === "nl" ? ABOUT_NL : ABOUT_EN);
      modalbox.style.whiteSpace = "normal";
      modal.classList.add("show");
    }
  });
  document.getElementById("m-lang").addEventListener("change", function (e) {
    send({ kind: "start", lang: e.target.value });
  });
  document.getElementById("modalclose").onclick = function () { if (saveFields || loadFields) cancelDialog(); else modal.classList.remove("show"); };

  // -- named save / load dialogs ------------------------------------------ //
  function clearModalBox() { modalbox.textContent = ""; modalbox.style.whiteSpace = "normal"; }
  function field(labelText, type) {
    const wrap = document.createElement("div"); wrap.style.margin = ".5rem 0";
    const lab = document.createElement("label"); lab.textContent = labelText;
    lab.style.display = "block"; lab.style.marginBottom = ".2rem";
    const inp2 = document.createElement("input"); inp2.type = type;
    if (type === "text") { inp2.autocapitalize = "off"; inp2.spellcheck = false; }
    if (type === "tel") { inp2.inputMode = "numeric"; inp2.maxLength = 12; }
    else { inp2.maxLength = 24; }
    inp2.style.width = "100%"; inp2.style.font = "inherit"; inp2.style.padding = ".3rem";
    wrap.appendChild(lab); wrap.appendChild(inp2); return { wrap: wrap, input: inp2 };
  }
  function msgLine(text, cls) {
    const p = document.createElement("div"); p.textContent = text || "";
    if (cls) p.style.color = cls; p.style.margin = ".4rem 0"; return p;
  }
  function button(text, onclick) {
    const b = document.createElement("button"); b.textContent = text;
    b.style.margin = ".3rem .3rem 0 0"; b.onclick = onclick; return b;
  }
  let saveFields = null;
  function openSaveDialog() {
    clearModalBox();
    const title = document.createElement("h2"); title.textContent = dlg.saveTitle || "Bewaar";
    const n = field(dlg.name || "Naam", "text");
    const p = field(dlg.pin || "PIN", "tel");
    const s = field(dlg.slot || "Naam", "text");
    saveFields = { name: n.input, pin: p.input, slot: s.input, confirm: false };
    const status = msgLine("", "#c08000"); status.id = "dlg-status";
    modalbox.appendChild(title);
    [n, p, s].forEach(function (f) { modalbox.appendChild(f.wrap); });
    modalbox.appendChild(msgLine(dlg.ttlNote || "", "#8a8a8a"));
    modalbox.appendChild(status);
    modalbox.appendChild(button(dlg.save || "Bewaar", submitSave));
    modalbox.appendChild(button(dlg.cancel || "Annuleer", cancelDialog));
    modal.classList.add("show"); n.input.focus();
  }
  function submitSave() {
    if (!saveFields) return;
    send({ kind: "save-submit", name: saveFields.name.value, pin: saveFields.pin.value,
           slot: saveFields.slot.value, confirm: saveFields.confirm });
  }
  function onSaveResult(msg) {
    const status = document.getElementById("dlg-status");
    if (msg.status === "ok") {
      modal.classList.remove("show"); saveFields = null;
      append("\n[" + (dlg.ok || "Opgeslagen").replace("{slot}", msg.slot || "") + "]\n", "notice");
      return;
    }
    if (!status) return;
    if (msg.status === "exists") { saveFields.confirm = true; status.textContent = dlg.exists || "Overschrijven?"; }
    else if (msg.status === "full") status.textContent = dlg.full || "";
    else if (msg.status === "invalid") status.textContent = dlg.invalid || "";
  }
  let loadFields = null;
  function openLoadDialog() {
    clearModalBox();
    const title = document.createElement("h2"); title.textContent = dlg.loadTitle || "Laad";
    const n = field(dlg.name || "Naam", "text");
    const p = field(dlg.pin || "PIN", "tel");
    loadFields = { name: n.input, pin: p.input };
    const status = msgLine("", "#c08000"); status.id = "dlg-status";
    modalbox.appendChild(title); modalbox.appendChild(n.wrap); modalbox.appendChild(p.wrap);
    modalbox.appendChild(status);
    modalbox.appendChild(button(dlg.load || "Laad", submitList));
    modalbox.appendChild(button(dlg.cancel || "Annuleer", cancelDialog));
    modal.classList.add("show"); n.input.focus();
  }
  function submitList() {
    if (!loadFields) return;
    send({ kind: "list-submit", name: loadFields.name.value, pin: loadFields.pin.value });
  }
  function renderSlotPicker(slots) {
    clearModalBox();
    const title = document.createElement("h2"); title.textContent = dlg.loadTitle || "Laad";
    modalbox.appendChild(title);
    if (!slots.length) { modalbox.appendChild(msgLine(dlg.noSaves || "", "#c08000")); }
    slots.forEach(function (sl) {
      const b = document.createElement("button");
      b.style.display = "block"; b.style.width = "100%"; b.style.textAlign = "left";
      b.style.margin = ".2rem 0";
      const nm = document.createElement("div"); nm.textContent = sl.name;   // textContent = no XSS
      const ht = document.createElement("div"); ht.textContent = sl.hint || "";
      ht.style.opacity = ".7"; ht.style.fontSize = ".85rem";
      b.appendChild(nm); b.appendChild(ht);
      b.onclick = function () {
        send({ kind: "load-pick", name: loadFields.name.value,
               pin: loadFields.pin.value, slot: sl.name });
      };
      modalbox.appendChild(b);
    });
    modalbox.appendChild(button(dlg.cancel || "Annuleer", cancelDialog));
  }
  function onLoadResult(msg) {
    if (msg.status === "ok") { modal.classList.remove("show"); loadFields = null; return; }
    const status = document.getElementById("dlg-status");
    const text = msg.status === "auth-fail" ? (dlg.authFail || "")
               : msg.status === "invalid" ? (dlg.invalid || "")
               : msg.status === "no-slot" ? (dlg.noSaves || "")
               : msg.status === "locked" ? (dlg.tooMany || "")
               : "";
    if (status) status.textContent = text;
    else append("\n[" + text + "]\n", "notice");
  }
  function cancelDialog() {
    modal.classList.remove("show"); saveFields = null; loadFields = null;
    send({ kind: "cancel" });
  }

  // -- connect / silent auto-reconnect -------------------------------------- //
  function showReconnecting() {
    if (!noticeShown) { append("\n[verbinding herstellen…]\n", "notice"); noticeShown = true; }
  }
  function clearReconnecting() { noticeShown = false; }

  function heartbeat() {
    clearInterval(hbTimer);
    hbTimer = setInterval(function () {
      if (!ws || ws.readyState !== 1) return;
      if (!gotPong) { try { ws.close(); } catch (e) {} return; }  // no pong -> dead
      gotPong = false; rawSend({ kind: "ping" });
    }, 25000);
  }

  function ensureConnected() {
    if (ws && (ws.readyState === 0 || ws.readyState === 1)) return;
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    connect();
  }

  function connect() {
    ws = new WebSocket(url);
    ws.onmessage = function (ev) { try { handle(JSON.parse(ev.data)); } catch (e) {} };
    ws.onopen = function () {
      backoff = 500; gotPong = true; clearReconnecting(); heartbeat();
      // Start in the player's remembered language (localStorage), else the browser
      // language, else Dutch. The server validates and falls back to Dutch for an
      // unknown code, then re-sends 'menu-labels' with the actual language (persisted).
      const want = loadLang() || (navigator.language || "nl").slice(0, 2);
      if (token) {
        const needRedraw = out.textContent.trim() === "";
        send({ kind: "resume", token: token, needRedraw: needRedraw, lang: want });
      } else {
        send({ kind: "start", lang: want });
      }
      while (queued.length) rawSend(queued.shift());
    };
    ws.onclose = function () {
      clearInterval(hbTimer);
      reconnectTimer = setTimeout(function () {
        reconnectTimer = null; showReconnecting(); ensureConnected();
      }, backoff);
      backoff = Math.min(backoff * 2, 10000);
    };
    ws.onerror = function () { try { ws.close(); } catch (e) {} };
  }

  document.addEventListener("visibilitychange", function () {
    if (document.visibilityState === "visible") ensureConnected();
  });
  window.addEventListener("online", ensureConnected);

  connect();
})();
</script>
</body>
</html>
