<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Dracula Avontuur — remake</title>
<style>
  :root { --bg:#000; --fg:#c8c8c8; --grn:#00c000; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--fg);
    font-family:"Consolas","DejaVu Sans Mono",monospace; }
  #app { display:flex; flex-direction:column; min-height:100dvh; }
  #menu { display:flex; gap:.25rem; padding:.35rem .5rem; background:#0a0a0a;
    border-bottom:1px solid #222; flex-wrap:wrap; }
  #layout { display:flex; flex:1; min-height:0; }
  #gamecol { display:flex; flex-direction:column; flex:1; min-width:0; min-height:0; }
  #about { width:340px; flex:none; overflow:auto; padding:.7rem 1rem; font-size:14px;
    line-height:1.35; border-left:1px solid #222; background:#080808; }
  #about h2 { font-size:1.05rem; margin:.1rem 0 .5rem; color:var(--grn); }
  #about a { color:#5aa0ff; }
  #about ul { margin:.3rem 0; padding-left:1.2rem; }
  #about li { margin:.15rem 0; }
  #about .muted { opacity:.7; font-size:.85rem; }
  @media (max-width:820px) {
    #app { height:auto; }
    #menu { position:sticky; top:0; z-index:5; }
    #layout { flex-direction:column; }
    #gamecol { min-height: calc(100dvh - 3.2rem); }   /* ~fills the screen below the menu; About scrolls below */
    #about { width:auto; flex:none; border-left:none; border-top:1px solid #333; }
  }
  #menu button, #menu select { background:#111; color:var(--fg); border:1px solid #333;
    font:inherit; padding:.3rem .6rem; border-radius:3px; }
  #menu button:disabled { opacity:.4; }
  #out { flex:1; overflow-y:auto; white-space:pre-wrap; word-break:break-word;
    padding:.6rem .8rem; line-height:1.25; font-size:15px; }
  #out .cmd { color:var(--grn); }
  #inbar { display:flex; align-items:center; border-top:1px solid #222; padding:.4rem .6rem; }
  #prompt { color:var(--grn); margin-right:.4rem; }
  #inp { flex:1; background:#000; color:var(--grn); border:none; outline:none;
    font:inherit; font-size:16px; }
  #keys { display:none; gap:.4rem; padding:.4rem .6rem; flex-wrap:wrap;
    border-top:1px solid #222; }
  #keys.show { display:flex; }
  #keys button { min-width:3rem; padding:.6rem; font:inherit; font-size:16px;
    background:#111; color:var(--grn); border:1px solid #333; border-radius:4px; }
  #modal { position:fixed; inset:0; background:rgba(0,0,0,.85); display:none;
    align-items:center; justify-content:center; padding:1rem; }
  #modal.show { display:flex; }
  #modal .box { background:#fff; color:#000; max-width:680px; max-height:80vh;
    overflow:auto; padding:1rem 1.2rem; border-radius:6px; white-space:pre-wrap; }
  #modal button { margin-top:1rem; font:inherit; padding:.4rem .8rem; }
  #modal .box a { color:#0645ad; }
  #modal .box h2 { margin:0 0 .5rem; font-size:1.15rem; }
  #modal .box ul { margin:.3rem 0; padding-left:1.3rem; }
  #modal .box li { margin:.15rem 0; }
  #lang-wrap { display:flex; align-items:center; gap:.2rem; }
  .notice { color:#c08000; }
</style>
</head>
<body>
<div id="app">
  <div id="menu" hidden>
    <button data-act="new"  id="m-new"></button>
    <button data-act="save" id="m-save"></button>
    <button data-act="load" id="m-load"></button>
    <span id="lang-wrap"><span aria-hidden="true">🌐</span><select id="m-lang" title="Taal / Language"></select></span>
    <button data-act="help" id="m-help"></button>
  </div>
  <div id="layout">
    <div id="gamecol">
      <div id="out"></div>
      <div id="keys"></div>
      <div id="inbar"><span id="prompt">&gt;</span><input id="inp" autocomplete="off"
        autocapitalize="off" autocorrect="off" spellcheck="false" enterkeyhint="send"></div>
    </div>
    <aside id="about"></aside>
  </div>
</div>
<div id="modal"><div><div class="box" id="modalbox"></div>
  <div style="text-align:center"><button id="modalclose">Sluit</button></div></div></div>
<script>
(function () {
  "use strict";
  const SAVE_KEY = "dracula_save";
  const out = document.getElementById("out");
  const inp = document.getElementById("inp");
  const menu = document.getElementById("menu");
  const keys = document.getElementById("keys");
  const modal = document.getElementById("modal");
  const modalbox = document.getElementById("modalbox");
  const aboutEl = document.getElementById("about");
  let ws, awaitMode = null, langs = {}, currentLang = "nl";

  const url = (location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/ws";

  // -- session persistence + queued/reconnect state ------------------------ //
  const SESSION_KEY = "dracula_session";
  let token = null; try { token = localStorage.getItem(SESSION_KEY); } catch (e) {}
  function storeToken(tk) { token = tk; try { localStorage.setItem(SESSION_KEY, tk); } catch (e) {} }
  let backoff = 500, reconnectTimer = null, hbTimer = null, gotPong = true;
  const queued = [];                 // client messages typed while the socket was down
  let noticeShown = false;

  function append(text, cls) {
    const span = document.createElement("span");
    if (cls) span.className = cls;
    span.textContent = text;
    out.appendChild(span);
    out.scrollTop = out.scrollHeight;
  }
  function rawSend(obj) { if (ws && ws.readyState === 1) { ws.send(JSON.stringify(obj)); return true; } return false; }
  function send(obj) { if (!rawSend(obj)) { queued.push(obj); ensureConnected(); } }

  function loadSave() {
    try { const s = localStorage.getItem(SAVE_KEY); return s ? JSON.parse(s) : null; }
    catch (e) { return null; }
  }
  function storeSave(data) {
    try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); }
    catch (e) { append("\n[Opslaan is niet beschikbaar in deze browser.]\n", "notice"); }
  }

  const LANG_KEY = "dracula_lang";
  function loadLang() { try { return localStorage.getItem(LANG_KEY) || ""; } catch (e) { return ""; } }
  function storeLang(code) { try { localStorage.setItem(LANG_KEY, code); } catch (e) {} }

  const REPO = "https://github.com/gerwout/dracula-adventure";
  const LATEST = REPO + "/releases/latest";
  const ORIG_ZIP = LATEST + "/download/dracula-original-1982.zip";   // stable name -> version-proof
  const TEKST = "https://www.tekstadventure.nl/database/dracula.html";
  function A(href, text) { return '<a href="' + href + '" target="_blank" rel="noopener">' + text + '</a>'; }

  const ABOUT_NL =
    '<h2>Over deze remake</h2>' +
    '<p>Dit is een moderne <strong>remake</strong> van het tekstavontuur <em>Dracula Avontuur</em> ' +
    '(oorspronkelijk Ronald van Woensel, &copy; 1982 Incore Automatisering, Rotterdam), geschreven in ' +
    'Python door <strong>Gerwout van der Veen</strong>.</p>' +
    '<p><strong>Broncode:</strong><br>' + A(REPO, "github.com/gerwout/dracula-adventure") + '</p>' +
    '<p><strong>Het originele spel (freeware):</strong><br>' + A(TEKST, "tekstadventure.nl") + '<br>' +
    A(ORIG_ZIP, "download originele DOS-versie (zip)") + '</p>' +
    '<p><strong>Downloaden &amp; installeren</strong> — nieuwste release:</p>' +
    '<ul><li>' + A(LATEST, "Windows") + ' (.exe)</li><li>' + A(LATEST, "macOS") + ' (.dmg)</li>' +
    '<li>' + A(LATEST, "Debian / Ubuntu") + ' (.deb)</li><li>' + A(LATEST, "Linux") + ' (AppImage)</li></ul>' +
    '<p class="muted">' + A(LATEST, "Alle downloads &raquo;") + '</p>';

  const ABOUT_EN =
    '<h2>About this remake</h2>' +
    '<p>This is a modern <strong>remake</strong> of the 1982 Dutch MS-DOS text adventure ' +
    '<em>Dracula Avontuur</em> (originally by Ronald van Woensel, &copy; 1982 Incore Automatisering, ' +
    'Rotterdam), written in Python by <strong>Gerwout van der Veen</strong>.</p>' +
    '<p><strong>Source code:</strong><br>' + A(REPO, "github.com/gerwout/dracula-adventure") + '</p>' +
    '<p><strong>The original game (freeware):</strong><br>' + A(TEKST, "tekstadventure.nl") + '<br>' +
    A(ORIG_ZIP, "download the original DOS version (zip)") + '</p>' +
    '<p><strong>Download &amp; install</strong> — latest release:</p>' +
    '<ul><li>' + A(LATEST, "Windows") + ' (.exe)</li><li>' + A(LATEST, "macOS") + ' (.dmg)</li>' +
    '<li>' + A(LATEST, "Debian / Ubuntu") + ' (.deb)</li><li>' + A(LATEST, "Linux") + ' (AppImage)</li></ul>' +
    '<p class="muted">' + A(LATEST, "All downloads &raquo;") + '</p>';

  function renderAbout() { aboutEl.innerHTML = (currentLang === "nl") ? ABOUT_NL : ABOUT_EN; }
  currentLang = loadLang() || "nl";
  renderAbout();

  function setMenu(flags) {
    menu.hidden = false;
    const f = (flags && typeof flags === "object") ? flags : {};
    document.getElementById("m-new").disabled = !f.new;
    document.getElementById("m-save").disabled = !f.save;
    document.getElementById("m-load").disabled = !f.load;
    document.getElementById("m-help").disabled = !f.help;
    document.getElementById("m-lang").disabled = !f.language;
  }
  function showKeys(list) {
    keys.innerHTML = "";
    list.forEach(function (k) {
      const b = document.createElement("button");
      b.textContent = k.label;
      b.onclick = function () { send({ kind: "key", ch: k.ch }); afterInput(); };
      keys.appendChild(b);
    });
    keys.classList.add("show");
  }
  function hideKeys() { keys.classList.remove("show"); keys.innerHTML = ""; }

  function afterInput() { /* keeps focus sane on mobile */ inp.focus(); }

  function handle(msg) {
    switch (msg.t) {
      case "out": append(msg.text); break;
      case "clear": out.textContent = ""; break;
      case "session": storeToken(msg.token); break;
      case "pong": gotPong = true; break;
      case "screen":
        document.getElementById("out").classList.toggle("title", msg.kind === "title");
        if (typeof fitTitle === "function") fitTitle();
        break;
      case "langs":
        langs = msg.available || {};
        const sel = document.getElementById("m-lang");
        sel.innerHTML = "";
        Object.keys(langs).forEach(function (code) {
          const o = document.createElement("option");
          o.value = code; o.textContent = langs[code]; sel.appendChild(o);
        });
        break;
      case "menu-labels":
        const L = msg.labels || {};
        document.getElementById("m-new").textContent = L.new || "Nieuw";
        document.getElementById("m-save").textContent = L.save || "Bewaar";
        document.getElementById("m-load").textContent = L.load || "Laad";
        document.getElementById("m-help").textContent = L.help || "Help";
        document.getElementById("m-lang").title = L.language || "Taal / Language";
        if (msg.lang) { document.getElementById("m-lang").value = msg.lang; currentLang = msg.lang; storeLang(msg.lang); renderAbout(); }
        break;
      case "await":
        awaitMode = msg.mode;
        setMenu(msg.menu);
        if (msg.mode === "key") { showKeys(msg.keys && msg.keys.length ? msg.keys : [{ label: "▶", ch: " " }]); inp.blur(); }
        else { hideKeys(); if (msg.mode === "line") inp.focus(); }
        break;
      case "save": storeSave(msg.data); break;
      case "load": send({ kind: "loaded", data: loadSave() }); break;
      case "help":
        modalbox.style.whiteSpace = "pre-wrap";
        modalbox.textContent = (msg.title ? msg.title + "\n\n" : "") + (msg.body || "");
        modal.classList.add("show");
        break;
    }
  }

  // -- input --------------------------------------------------------------- //
  inp.addEventListener("keydown", function (e) {
    if (modal.classList.contains("show")) { e.preventDefault(); return; }
    if (e.key === "Enter") {
      const line = inp.value;
      inp.value = "";
      if (awaitMode === "key") { send({ kind: "key", ch: line.slice(0, 1) || " " }); }
      else {
        append("\n→ " + line + "\n", "cmd");
        send({ kind: "line", text: line });
      }
    } else if (awaitMode === "key" && e.key.length === 1) {
      e.preventDefault();
      send({ kind: "key", ch: e.key });
    }
  });
  document.addEventListener("keydown", function (e) {
    if (modal.classList.contains("show")) {
      if (e.key === "Escape") modal.classList.remove("show");
      return;                       // while Help is open, keys must not reach the game
    }
    if (awaitMode === "key" && document.activeElement !== inp && e.key.length === 1) {
      e.preventDefault();
      send({ kind: "key", ch: e.key });
    }
  });

  menu.addEventListener("click", function (e) {
    const b = e.target.closest("button"); if (!b) return;
    const act = b.dataset.act;
    if (act === "new") send({ kind: "start", lang: document.getElementById("m-lang").value });
    else if (act === "save" || act === "load" || act === "help") send({ kind: "menu", action: act });
  });
  document.getElementById("m-lang").addEventListener("change", function (e) {
    send({ kind: "start", lang: e.target.value });
  });
  document.getElementById("modalclose").onclick = function () { modal.classList.remove("show"); };

  // -- connect / silent auto-reconnect -------------------------------------- //
  function showReconnecting() {
    if (!noticeShown) { append("\n[verbinding herstellen…]\n", "notice"); noticeShown = true; }
  }
  function clearReconnecting() { noticeShown = false; }

  function heartbeat() {
    clearInterval(hbTimer);
    hbTimer = setInterval(function () {
      if (!ws || ws.readyState !== 1) return;
      if (!gotPong) { try { ws.close(); } catch (e) {} return; }  // no pong -> dead
      gotPong = false; rawSend({ kind: "ping" });
    }, 25000);
  }

  function ensureConnected() {
    if (ws && (ws.readyState === 0 || ws.readyState === 1)) return;
    connect();
  }

  function connect() {
    ws = new WebSocket(url);
    ws.onmessage = function (ev) { try { handle(JSON.parse(ev.data)); } catch (e) {} };
    ws.onopen = function () {
      backoff = 500; gotPong = true; clearReconnecting(); heartbeat();
      // Start in the player's remembered language (localStorage), else the browser
      // language, else Dutch. The server validates and falls back to Dutch for an
      // unknown code, then re-sends 'menu-labels' with the actual language (persisted).
      const want = loadLang() || (navigator.language || "nl").slice(0, 2);
      if (token) {
        const needRedraw = out.textContent.trim() === "";
        send({ kind: "resume", token: token, needRedraw: needRedraw, lang: want });
      } else {
        send({ kind: "start", lang: want });
      }
      while (queued.length) rawSend(queued.shift());
    };
    ws.onclose = function () {
      clearInterval(hbTimer);
      if (reconnectTimer) clearTimeout(reconnectTimer);
      reconnectTimer = setTimeout(function () {
        showReconnecting(); connect();
      }, backoff);
      backoff = Math.min(backoff * 2, 10000);
    };
    ws.onerror = function () { try { ws.close(); } catch (e) {} };
  }

  document.addEventListener("visibilitychange", function () {
    if (document.visibilityState === "visible") ensureConnected();
  });
  window.addEventListener("online", ensureConnected);

  connect();
})();
</script>
</body>
</html>
